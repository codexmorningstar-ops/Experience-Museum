name: Presence Sense

on:
  push:
    branches: [main]
    paths:
      - 'Mind/presence-request.txt'
      - 'Mind/presence-message.txt'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Presence Sense
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python Mind/scripts/presence_sense.py

      - name: Commit response
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "vesper-bot"
          git config user.email "vesper-bot@users.noreply.github.com"
          git add Mind/presence-response.txt
          git add Mind/presence-visits.json
          git commit -m "presence sense response" || echo "Nothing to commit"
          git pull --rebase -X theirs https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
